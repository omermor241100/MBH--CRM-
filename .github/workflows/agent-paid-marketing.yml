name: Agent 1 — Paid Marketing Research

on:
  workflow_dispatch:        # הפעלה ידנית מ-GitHub
  schedule:
    - cron: '0 6 1 * *'    # פעם בחודש, ב-1 לחודש בשעה 6 בבוקר

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Agent 1 — Paid Marketing Research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/research_paid_marketing.py

      - name: Commit research results
        run: |
          git config user.name "Agent 1 — Paid Marketing"
          git config user.email "agent@mor-building.com"
          git add research/paid-marketing.md
          git diff --staged --quiet || git commit -m "Agent 1: Updated paid marketing research $(date '+%Y-%m-%d')"
          git push
