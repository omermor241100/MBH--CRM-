<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBH Story Ad</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:        #E2DED0;
    --gold:         #C9A84C;
    --gold-light:   #E8C97A;
    --dark:         #1a1710;
    --glass-border: rgba(255,255,255,0.22);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0c09;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 9:16 story container */
  .ad {
    position: relative;
    width: min(100vw, 56.25vh);
    height: min(100vh, 177.78vw);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(10px, 2.5vw, 20px);
  }

  /* Background sketch */
  .bg {
    position: absolute;
    inset: 0;
    background: url('bg-sketch.jpg') center center / cover no-repeat;
    filter: grayscale(25%) brightness(0.6);
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      rgba(26,23,16,0.10) 20%,
      rgba(26,23,16,0.50) 65%,
      rgba(10,9,6,0.85) 100%
    );
    animation: fadeIn 1.4s ease both;
  }

  .grad-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 28%;
    background: linear-gradient(to top, rgba(10,9,6,0.92), transparent);
  }

  /* ── FRAME — tight around logo only ── */
  .logo-frame {
    position: relative;
    z-index: 10;
    border: 1px solid var(--glass-border);
    padding: clamp(12px, 3vw, 26px);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.35s both;
  }

  /* Gold corner accents */
  .logo-frame::before, .logo-frame::after {
    content: '';
    position: absolute;
    width: clamp(12px, 3vw, 22px);
    height: clamp(12px, 3vw, 22px);
    border-color: var(--gold);
    border-style: solid;
  }
  .logo-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .logo-frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .logo-img {
    width: clamp(130px, 34vw, 270px);
    height: clamp(130px, 34vw, 270px);
    object-fit: contain;
    animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.55s both;
  }

  /* ── BELOW FRAME ── */
  .divider {
    position: relative;
    z-index: 10;
    width: clamp(50px, 13vw, 110px);
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.85s both;
  }

  .tagline {
    position: relative;
    z-index: 10;
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(13px, 3.2vw, 28px);
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.5;
    animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) 1.0s both;
  }

  /* ── BOTTOM ── */
  .bottom-text {
    position: absolute;
    bottom: 9%;
    width: 100%;
    text-align: center;
    z-index: 10;
    font-family: 'Heebo', sans-serif;
    font-size: clamp(10px, 2.4vw, 20px);
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--brand);
    white-space: nowrap;
    animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 1.1s both;
  }

  .url {
    position: absolute;
    bottom: 4.5%;
    width: 100%;
    text-align: center;
    z-index: 10;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(8px, 1.8vw, 16px);
    font-weight: 300;
    letter-spacing: 0.18em;
    color: rgba(201,168,76,0.65);
    direction: ltr;
    animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 1.25s both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(36px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>
<div class="ad">

  <div class="bg"></div>
  <div class="vignette"></div>
  <div class="grad-bottom"></div>

  <a href="https://mor-building.com" style="text-decoration:none; z-index:10; display:flex; flex-direction:column; align-items:center; gap:clamp(10px,2.5vw,20px); transform:translateY(-8%);">
    <div class="logo-frame">
      <img class="logo-img" src="logo-transparent.png" alt="MBH Logo">
    </div>
    <div class="divider"></div>
    <div class="tagline">הופכים חלום למציאות</div>
  </a>

  <div class="bottom-text">בנייה &nbsp;·&nbsp; אמינות &nbsp;·&nbsp; מצוינות</div>
  <div class="url">mor-building.com</div>

</div>

</body>
</html>
