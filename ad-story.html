<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBH Story Ad</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:        #E2DED0;
    --gold:         #C9A84C;
    --gold-light:   #E8C97A;
    --dark:         #1a1710;
    --glass-border: rgba(255,255,255,0.22);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0c09;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── 9:16 story container (Instagram / TikTok) ── */
  .ad {
    position: relative;
    width: min(100vw, 56.25vh);
    height: min(100vh, 177.78vw);
    overflow: hidden;
    background: #0d0c09;
  }

  /* ── Instagram / TikTok story progress bar ── */
  .story-bar {
    position: absolute;
    top: 14px;
    left: 10px;
    right: 10px;
    z-index: 100;
    display: flex;
    gap: 4px;
  }

  .seg {
    flex: 1;
    height: 2.5px;
    background: rgba(255,255,255,0.28);
    border-radius: 2px;
    overflow: hidden;
  }

  .seg-fill {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 2px;
  }

  /* ── Screens ── */
  .screen {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.75s ease;
    pointer-events: none;
  }

  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── Screen 1: Video ── */
  .screen-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: contrast(1.08) saturate(1.12) brightness(1.02);
  }

  /* ── Screen 2: End Card ── */
  .screen-end {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: clamp(25px, 6vw, 50px) 0 clamp(20px, 4vh, 40px);
    gap: clamp(14px, 3.5vw, 28px);
  }

  .bg {
    position: absolute;
    inset: 0;
    background: url('bg-sketch.jpg') center center / cover no-repeat;
    filter: grayscale(25%) brightness(0.6);
  }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      rgba(26,23,16,0.10) 20%,
      rgba(26,23,16,0.50) 65%,
      rgba(10,9,6,0.85) 100%
    );
  }

  .grad-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(to top, rgba(10,9,6,0.97), rgba(10,9,6,0.4) 60%, transparent);
  }

  /* ── Logo frame ── */
  .logo-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── CTA Button ── */
  .cta-btn {
    position: relative;
    z-index: 10;
    display: block;
    width: clamp(200px, 72%, 380px);
    padding: clamp(10px, 2.5vw, 18px) clamp(15px, 4vw, 30px);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Heebo', sans-serif;
    font-size: clamp(11px, 2.4vw, 19px);
    font-weight: 400;
    letter-spacing: 0.1em;
    text-decoration: none;
    text-align: center;
    background: rgba(10,9,6,0.5);
    backdrop-filter: blur(4px);
  }

  /* ── Tagline section ── */
  .tagline-section {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(8px, 2vw, 15px);
    width: 100%;
  }

  .logo-frame {
    border: 1px solid var(--glass-border);
    padding: clamp(6px, 1.5vw, 14px);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logo-frame::before, .logo-frame::after {
    content: '';
    position: absolute;
    width: clamp(18px, 5vw, 40px);
    height: clamp(18px, 5vw, 40px);
    border-color: var(--gold);
    border-style: solid;
  }
  .logo-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .logo-frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .logo-img {
    width: min(38vh, 67vw);
    height: min(38vh, 67vw);
    object-fit: contain;
  }

  .divider {
    width: clamp(50px, 13vw, 110px);
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .tagline {
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(13px, 3.2vw, 28px);
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.5;
  }

  /* ── Bottom contact block ── */
  .bottom-info {
    position: relative;
    margin-top: auto;
    width: 100%;
    text-align: center;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(3px, 0.9vw, 9px);
  }

  .slogan {
    font-family: 'Heebo', sans-serif;
    font-size: clamp(10px, 2.4vw, 20px);
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--brand);
    white-space: nowrap;
    margin-bottom: clamp(4px, 1vw, 10px);
  }

  .contact-row {
    font-family: 'Heebo', sans-serif;
    font-size: clamp(10px, 2.2vw, 15px);
    font-weight: 300;
    letter-spacing: 0.08em;
    color: rgba(226,222,208,0.82);
    direction: ltr;
  }

  .url {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(10px, 2vw, 14px);
    font-weight: 300;
    letter-spacing: 0.18em;
    color: rgba(201,168,76,0.7);
    direction: ltr;
    margin-top: clamp(2px, 0.5vw, 6px);
  }

  /* ── Sound button ── */
  .sound-btn {
    position: absolute;
    bottom: 22px;
    right: 16px;
    z-index: 200;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(4px);
  }
  .sound-btn svg { width: 20px; height: 20px; fill: #fff; }

  /* ── Entry animations ── */
  .screen-end .logo-wrap,
  .screen-end .cta-btn,
  .screen-end .tagline-section,
  .screen-end .bottom-info { opacity: 0; }

  .screen-end.active .logo-wrap {
    animation: slideUp 1s cubic-bezier(0.22,1,0.36,1) 0.3s both;
  }
  .screen-end.active .cta-btn {
    animation: slideUpCta 0.9s cubic-bezier(0.22,1,0.36,1) 0.55s both;
  }
  .screen-end.active .tagline-section {
    animation: slideUpTagline 0.9s cubic-bezier(0.22,1,0.36,1) 0.75s both;
  }
  .screen-end.active .bottom-info {
    animation: slideUpTagline 0.9s cubic-bezier(0.22,1,0.36,1) 0.95s both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUpCta {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUpTagline {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="ad">

  <!-- Story progress bar: 2 segments -->
  <div class="story-bar">
    <div class="seg"><div class="seg-fill" id="fill1"></div></div>
    <div class="seg"><div class="seg-fill" id="fill2"></div></div>
  </div>

  <!-- ── Sound button ── -->
  <button class="sound-btn" id="sound-btn" aria-label="הפעל שמע">
    <!-- muted icon -->
    <svg id="icon-muted" viewBox="0 0 24 24"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97V10.18l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 18l1.73 1.73L21 18.46 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    <!-- sound icon (hidden initially) -->
    <svg id="icon-sound" viewBox="0 0 24 24" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </button>

  <!-- ── Screen 1: Video ── -->
  <div class="screen screen-video active" id="screen-video">
    <video id="main-video" autoplay muted playsinline webkit-playsinline preload="auto">
      <source src="ad-video.mp4" type="video/mp4">
    </video>
  </div>

  <!-- ── Screen 2: End Card ── -->
  <div class="screen screen-end" id="screen-end">

    <div class="bg"></div>
    <div class="vignette"></div>
    <div class="grad-bottom"></div>

    <div class="logo-wrap">
      <div class="logo-frame">
        <img class="logo-img" src="logo-transparent.png" alt="MBH Logo">
      </div>
    </div>

    <a class="cta-btn" href="https://mor-building.com">לחצו והשאירו פרטים</a>

    <div class="tagline-section">
      <div class="divider"></div>
      <div class="tagline">הופכים חלום למציאות...</div>
      <div class="slogan">בנייה &nbsp;·&nbsp; אמינות &nbsp;·&nbsp; מצוינות</div>
    </div>

    <div class="bottom-info">
      <div class="contact-row">morbuildingholdings@gmail.com</div>
      <div class="contact-row">050-646-0099</div>
      <div class="url">mor-building.com</div>
    </div>

  </div>

</div>

<script>
const video    = document.getElementById('main-video');
  const scVideo  = document.getElementById('screen-video');
  const scEnd    = document.getElementById('screen-end');
  const fill1    = document.getElementById('fill1');
  const fill2    = document.getElementById('fill2');

  const END_CARD_SEC = 6;
  let endCardShown = false;
  let videoStarted = false;

  function showEndCard() {
    if (endCardShown) return;
    endCardShown = true;
    fill1.style.width = '100%';
    scVideo.classList.remove('active');
    scEnd.classList.add('active');
    let start = null;
    function tick(ts) {
      if (!start) start = ts;
      const pct = Math.min((ts - start) / (END_CARD_SEC * 1000) * 100, 100);
      fill2.style.width = pct + '%';
      if (pct < 100) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // ── Video progress ──
  video.addEventListener('timeupdate', () => {
    videoStarted = true;
    if (video.duration) {
      fill1.style.width = (video.currentTime / video.duration * 100) + '%';
    }
  });


  video.addEventListener('ended', showEndCard);
  video.addEventListener('error',  showEndCard);

  // ── Universal play attempt ──
  const soundBtn   = document.getElementById('sound-btn');
  const iconMuted  = document.getElementById('icon-muted');
  const iconSound  = document.getElementById('icon-sound');
  let   isMuted    = true;

  soundBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    isMuted = !isMuted;
    video.muted = isMuted;
    iconMuted.style.display = isMuted ? '' : 'none';
    iconSound.style.display = isMuted ? 'none' : '';
  });

  function tryPlay() {
    video.muted = true;
    const p = video.play();
    if (p !== undefined) {
      p.catch(() => {
        document.addEventListener('click',      onUserGesture, { once: true });
        document.addEventListener('touchstart', onUserGesture, { once: true });
      });
    }
  }

  function onUserGesture() {
    video.play().catch(() => showEndCard());
  }

  // Start as soon as possible
  if (video.readyState >= 2) {
    tryPlay();
  } else {
    video.addEventListener('canplay', tryPlay, { once: true });
    video.load(); // force load on all browsers
  }

  // ── Stall detection: if buffering too long, show end card ──
  video.addEventListener('stalled',  () => setTimeout(() => { if (!videoStarted) showEndCard(); }, 5000));
  video.addEventListener('waiting',  () => setTimeout(() => { if (!videoStarted) showEndCard(); }, 8000));

  // ── Hard timeout: 10s max wait ──
  setTimeout(() => { if (!videoStarted) showEndCard(); }, 10000);
</script>

</body>
</html>
