<title>MBH · מערכת CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0e0b;
    --surface: #1a1916;
    --surface2: #222018;
    --border: rgba(195,183,153,0.15);
    --brand: #C3B799;
    --brand-dim: rgba(195,183,153,0.6);
    --text: #e8e2d6;
    --text-muted: rgba(232,226,214,0.5);
    --danger: #c0614a;
    --success: #6a9e72;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }
  .login-box {
    width: 100%;
    max-width: 380px;
    padding: 48px 40px;
    border: 1px solid var(--border);
    background: var(--surface);
    text-align: center;
  }
  .login-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--brand);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .login-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }
  .login-label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 7px;
    text-align: right;
  }
  .login-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.95rem;
    outline: none;
    margin-bottom: 20px;
    direction: ltr;
    transition: border-color 0.3s;
  }
  .login-input:focus { border-color: var(--brand); }
  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--brand);
    color: var(--bg);
    border: none;
    font-family: 'Heebo', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-error {
    margin-top: 14px;
    font-size: 0.82rem;
    color: var(--danger);
    display: none;
  }

  /* ── MAIN APP ── */
  #app { display: none; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--brand);
    letter-spacing: 0.08em;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .topbar-count {
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .topbar-count span {
    color: var(--brand);
    font-weight: 600;
  }
  .logout-btn {
    font-size: 0.78rem;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Heebo', sans-serif;
  }
  .logout-btn:hover { border-color: var(--brand); color: var(--brand); }

  .main {
    padding: 32px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.3s;
    direction: rtl;
  }
  .search-input:focus { border-color: var(--brand); }
  .search-input::placeholder { color: var(--text-muted); }

  .export-btn {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--brand);
    color: var(--brand);
    font-family: 'Heebo', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .export-btn:hover { background: var(--brand); color: var(--bg); }

  .clear-btn {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid rgba(192,97,74,0.4);
    color: var(--danger);
    font-family: 'Heebo', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .clear-btn:hover { background: var(--danger); color: white; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 24px;
    position: relative;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--brand);
    opacity: 0.5;
  }
  .stat-card-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--brand);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-card-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
  }
  thead tr {
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  th {
    padding: 14px 18px;
    text-align: right;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--brand);
    white-space: nowrap;
  }
  td {
    padding: 14px 18px;
    font-size: 0.88rem;
    border-bottom: 1px solid rgba(195,183,153,0.07);
    color: var(--text);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: rgba(195,183,153,0.04); }

  .td-work {
    max-width: 240px;
    color: var(--text-muted);
    font-size: 0.83rem;
    line-height: 1.5;
  }
  .td-date {
    font-size: 0.78rem;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .td-phone, .td-email {
    direction: ltr;
    text-align: right;
    unicode-bidi: plaintext;
  }

  .td-price {
    font-weight: 500;
    color: var(--brand);
    white-space: nowrap;
    font-size: 0.88rem;
  }
  .price-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--brand);
    padding: 6px 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    width: 110px;
    outline: none;
    direction: ltr;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .price-input::-webkit-outer-spin-button,
  .price-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .price-input:focus { border-color: var(--brand); }
  .delete-btn {
    background: none;
    border: 1px solid rgba(192,97,74,0.3);
    color: var(--danger);
    padding: 4px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Heebo', sans-serif;
  }
  .delete-btn:hover { background: var(--danger); color: white; }

  /* ── EMPTY STATE ── */
  .empty-state {
    padding: 60px 24px;
    text-align: center;
  }
  .empty-state-icon {
    font-size: 2.5rem;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .empty-state-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--text-muted);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--brand);
    color: var(--brand);
    padding: 12px 24px;
    font-size: 0.85rem;
    font-family: 'Heebo', sans-serif;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) {
    .main { padding: 16px; }
    .topbar { padding: 14px 16px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stats-row .stat-card:last-child { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<script>
const PASSWORD = 'mbh2025';
const STORAGE_KEY = 'mbh_leads';

function doLogin() {
  const val = document.getElementById('passInput').value;
  if (val === PASSWORD) {
    sessionStorage.setItem('mbh_auth', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderTable();
    updateStats();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('passInput').value = '';
  }
}
function doLogout() {
  sessionStorage.removeItem('mbh_auth');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('passInput').value = '';
  document.getElementById('loginError').style.display = 'none';
}

function getLeads() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveLeads(leads) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
}

// Public API — called from landing page
window.addLead = function(name, phone, email, work, price) {
  const leads = getLeads();
  leads.unshift({
    id: Date.now(),
    name, phone, email, work, price: price || "",
    date: new Date().toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
  });
  saveLeads(leads);
  fetch('https://script.google.com/macros/s/AKfycby1528__diL8TYbvjjzwO2G4WUbiCDzfrDBeVfQ2nOTLREz7e7PL_tBJf2Rc6iHDfeHpg/exec', {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, phone: phone, email: email, work: work, price: price || '' })
  }).catch(function(){});
};

function deleteLead(id) {
  if (!confirm('למחוק ליד זה?')) return;
  const leads = getLeads().filter(l => l.id !== id);
  saveLeads(leads);
  renderTable();
  updateStats();
  showToast('הליד נמחק');
}

function clearAll() {
  if (!confirm('למחוק את כל הלידים? פעולה זו אינה הפיכה.')) return;
  saveLeads([]);
  renderTable();
  updateStats();
  showToast('כל הלידים נמחקו');
}

function renderTable() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let leads = getLeads();
  if (q) leads = leads.filter(l =>
    (l.name||'').toLowerCase().includes(q) ||
    (l.phone||'').includes(q) ||
    (l.email||'').toLowerCase().includes(q)
  );

  const tbody = document.getElementById('leadsTableBody');
  const empty = document.getElementById('emptyState');

  if (leads.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = leads.map((l, i) => `
    <tr>
      <td style="color:var(--text-muted);font-size:0.8rem;">${i + 1}</td>
      <td><strong style="font-weight:500;">${esc(l.name)}</strong></td>
      <td class="td-phone">${esc(l.phone)}</td>
      <td class="td-email" style="font-size:0.83rem;">${esc(l.email)}</td>
      <td class="td-work">${esc(l.work)}</td>
      <td><input type='number' class='price-input' placeholder='₪ מחיר' value='${esc(l.price||"")}' onchange='updatePrice(${l.id}, this.value)' min='0'></td>
      <td class="td-date">${esc(l.date)}</td>
      <td><button class="delete-btn" onclick="deleteLead(${l.id})">מחק</button></td>
    </tr>
  `).join('');

  document.getElementById('totalCount').textContent = getLeads().length;
}

function updateStats() {
  const leads = getLeads();
  const now = new Date();
  const todayStr = now.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' });
  const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);

  document.getElementById('statTotal').textContent = leads.length;
  document.getElementById('totalCount').textContent = leads.length;

  const todayLeads = leads.filter(l => l.date && l.date.startsWith(todayStr));
  document.getElementById('statToday').textContent = todayLeads.length;

  const weekLeads = leads.filter(l => {
    if (!l.id) return false;
    return new Date(l.id) >= weekAgo;
  });
  document.getElementById('statWeek').textContent = weekLeads.length;
}

function updatePrice(id, val) {
  const leads = getLeads();
  const lead = leads.find(l => l.id === id);
  if (!lead) return;
  lead.price = val;
  saveLeads(leads);
  showToast('המחיר נשמר ✓');
}

function exportCSV() {
  const leads = getLeads();
  if (leads.length === 0) { showToast('אין נתונים לייצוא'); return; }

  const BOM = '\uFEFF';
  const headers = ['#', 'שם לקוח', 'טלפון', 'אימייל', 'תיאור העבודה', 'הצעת מחיר', 'תאריך'];
  const rows = leads.map((l, i) => [
    i + 1,
    '"' + (l.name||'').replace(/"/g,'""') + '"',
    '"' + (l.phone||'').replace(/"/g,'""') + '"',
    '"' + (l.email||'').replace(/"/g,'""') + '"',
    '"' + (l.work||'').replace(/"/g,'""') + '"',
    '"' + (l.date||'').replace(/"/g,'""') + '"'
  ].join(','));

  const csv = BOM + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'MBH_Leads_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('הקובץ יורד...');
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// No demo data - leads saved in localStorage
</script>

        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "block";
        renderLeads();
        updateStats();
      } else {
        document.getElementById("loginScreen").style.display = "flex";
      }
    }, 500);
  }, 1600);
});
